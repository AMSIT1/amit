<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Credit Care Relief Foundation</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f3fff5;
overflow-x:hidden;
}

/* HERO */

.hero{
height:100vh;
background:linear-gradient(135deg,#00a651,#1dd75f);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
color:white;
position:relative;
overflow:hidden;
}

.smiley{
position:absolute;
font-size:40px;
opacity:.15;
animation:float 10s linear infinite;
}

@keyframes float{
from{
transform:translateY(100vh);
}
to{
transform:translateY(-150px);
}
}

.big-money{
font-size:clamp(60px,12vw,180px);
font-weight:900;
line-height:1;
text-shadow:0 10px 30px rgba(0,0,0,.25);
}

.money-label{
font-size:24px;
margin-top:20px;
letter-spacing:3px;
}

.people{
margin-top:30px;
font-size:clamp(30px,5vw,70px);
font-weight:bold;
}

.donate-btn{
margin-top:40px;
padding:20px 50px;
background:white;
color:#00a651;
font-size:24px;
font-weight:bold;
border-radius:60px;
text-decoration:none;
box-shadow:0 10px 25px rgba(0,0,0,.2);
}

/* IMPACT */

.impact{
padding:80px 20px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:25px;
max-width:1300px;
margin:auto;
}

.card{
background:white;
padding:35px;
border-radius:30px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,.08);
}

.card-icon{
font-size:70px;
}

.card-number{
font-size:55px;
font-weight:900;
color:#00a651;
margin:15px 0;
}

/* WALL */

.wall{
background:#00a651;
color:white;
padding:120px 20px;
text-align:center;
}

.wall h2{
font-size:clamp(40px,8vw,100px);
margin-bottom:25px;
}

.wall p{
font-size:24px;
max-width:900px;
margin:auto;
line-height:1.8;
}

.smile-row{
font-size:40px;
margin:25px 0;
}

/* JOURNEY */

.journey{
padding:120px 20px;
background:white;
text-align:center;
}

.journey h2{
font-size:clamp(40px,7vw,90px);
color:#00a651;
margin-bottom:20px;
font-weight:900;
}

.journey-subtitle{
font-size:22px;
margin-bottom:60px;
color:#555;
}

.river-container{
display:flex;
justify-content:center;
align-items:center;
gap:40px;
flex-wrap:wrap;
}

.state{
font-size:28px;
font-weight:bold;
line-height:2.2;
}

.left{
color:#e74c3c;
}

.right{
color:#00a651;
}

.river{
width:500px;
height:120px;
background:#dff6ff;
border-radius:80px;
overflow:hidden;
position:relative;
box-shadow:0 10px 30px rgba(0,0,0,.1);
}

.water{
position:absolute;
width:300%;
height:100%;
background:
linear-gradient(
90deg,
#00bfff,
#5fd7ff,
#00bfff,
#5fd7ff
);
animation:flowWater 6s linear infinite;
}

@keyframes flowWater{
0%{transform:translateX(-50%);}
100%{transform:translateX(0);}
}

.flow-item{
position:absolute;
font-weight:bold;
color:white;
font-size:22px;
z-index:2;
animation:moveMoney 6s linear infinite;
}

.one{top:15px;}
.two{top:50px;animation-delay:2s;}
.three{top:85px;animation-delay:4s;}

@keyframes moveMoney{
0%{left:-200px;}
100%{left:100%;}
}

/* JOIN */

.join{
padding:100px 20px;
text-align:center;
background:#f7fff7;
}

.join h2{
font-size:60px;
color:#00a651;
margin-bottom:20px;
}

.join input{
width:90%;
max-width:500px;
padding:18px;
font-size:20px;
margin:10px;
border:1px solid #ddd;
border-radius:15px;
}

.join button{
padding:18px 40px;
font-size:22px;
border:none;
border-radius:15px;
background:#00a651;
color:white;
cursor:pointer;
}

/* FOOTER */

footer{
background:#111;
color:white;
padding:40px;
text-align:center;
}

</style>
</head>
